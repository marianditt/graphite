<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>??-0 Service Index — graphite</title>
<style>

:root {
  --bg: #0b1120;
  --surface: #111b2e;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --accent: #22d3ee;
  --accent-dim: #0891b2;
  --accent-glow: rgba(34, 211, 238, 0.12);
  --border: #1e293b;
  --code-bg: #0a0f1a;
  --code-border: #1e293b;
}

* { box-sizing: border-box; }

html {
  font-size: 150%;
}

body {
  font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  max-width: 74ch;
  margin: 0 auto;
  padding: 1.5rem 1rem 3rem;
  font-size: 1rem;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

.brand {
  margin: 0 0 0.9rem;
  color: var(--accent);
  font-weight: 700;
  font-size: 0.9em;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  text-shadow: 0 0 10px var(--accent-glow);
}

/* ── Typography ──────────────────────────────────────────────── */

h1, h2, h3, h4, h5, h6 {
  color: #f1f5f9;
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1.3;
}

h1 {
  font-size: clamp(1.45rem, 2.6vw, 1.9rem);
  line-height: 1.25;
  padding-bottom: 0.35em;
  border-bottom: 1px solid var(--border);
  margin: 0 0 1rem;
}

h2 { font-size: clamp(1.2rem, 2vw, 1.45rem); margin: 1.6rem 0 0.7rem; }
h3 { font-size: clamp(1.08rem, 1.6vw, 1.25rem); margin: 1.35rem 0 0.6rem; }
h4 { font-size: 1.05rem; margin: 1.2rem 0 0.5rem; }

p { margin: 0.75rem 0; }

/* ── Links ────────────────────────────────────────────────────── */

a {
  color: var(--accent);
  text-decoration: underline;
  text-underline-offset: 2px;
  text-decoration-thickness: 1px;
  font-size: 1em;
  transition: color 0.15s, text-shadow 0.2s;
}

a:hover {
  color: #67e8f9;
  text-shadow: 0 0 10px var(--accent-glow);
}

.node-meta a { color: var(--accent-dim); }
.node-meta a:hover { color: var(--accent); }

/* ── Node meta bar ────────────────────────────────────────────── */

.node-meta {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.65rem 0.9rem;
  margin-bottom: 1.25rem;
  color: var(--text-dim);
  font-size: 1em;
  display: flex;
  gap: 0.65rem;
  align-items: baseline;
  flex-wrap: wrap;
}

/* ── Evidence section ─────────────────────────────────────────── */

.evidence {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.85rem 1rem;
  margin-top: 1.4rem;
}

.evidence h3 {
  color: var(--accent-dim);
  font-size: 1.05em;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin: 0 0 0.55rem;
}

.evidence code {
  background: var(--code-bg);
}

/* ── Backlinks ────────────────────────────────────────────────── */

.backlinks {
  border-top: 1px solid var(--border);
  margin-top: 1.8rem;
  padding-top: 0.75rem;
}

.backlinks h3 {
  color: var(--text-dim);
  font-size: 1.05em;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin: 0 0 0.5rem;
}

.backlinks ul {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-wrap: wrap;
  gap: 0.4em 0.8em;
}

.backlinks li a {
  color: var(--text-dim);
  font-size: 1em;
  transition: color 0.15s;
}

.backlinks li a:hover {
  color: var(--accent);
}

/* ── Code blocks ──────────────────────────────────────────────── */

pre {
  background: var(--code-bg);
  border: 1px solid var(--code-border);
  border-radius: 6px;
  padding: 0.95rem 1rem;
  overflow-x: auto;
  font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'SF Mono', monospace;
  font-size: 0.9em;
  line-height: 1.55;
  tab-size: 4;
}

code {
  background: var(--code-bg);
  padding: 0.1rem 0.35rem;
  border-radius: 4px;
  font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'SF Mono', monospace;
  font-size: 0.9em;
}

pre code {
  background: none;
  padding: 0;
  border-radius: 0;
}

/* ── Lists ────────────────────────────────────────────────────── */

ul, ol {
  padding-left: 1.2rem;
}

li { margin: 0.45rem 0; }

/* ── Kind index pages ─────────────────────────────────────────── */

h1 a[href$="index.html"] {
  color: var(--text);
}

body > a[href$="index.html"] {
  display: inline-block;
  margin-top: 1.3rem;
  color: var(--text-dim);
  font-size: 1em;
  transition: color 0.15s;
}

body > a[href$="index.html"]:hover {
  color: var(--accent);
}

/* ── Root index body ──────────────────────────────────────────── */

.index-body {
  margin-top: 1.25rem;
  padding: 0.45rem 0;
  border-top: 1px solid var(--border);
}

/* ── Blockquotes ──────────────────────────────────────────────── */

blockquote {
  border-left: 3px solid var(--accent-dim);
  margin: 1rem 0;
  padding: 0.4rem 0.95rem;
  background: var(--surface);
  border-radius: 0 4px 4px 0;
  color: var(--text-dim);
}

/* ── Horizontal rules ──────────────────────────────────────────── */

hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 1.35rem 0;
}

/* ── Tables ────────────────────────────────────────────────────── */

table {
  width: 100%;
  border-collapse: collapse;
  margin: 1rem 0;
  font-size: 1em;
}

th, td {
  padding: 0.45rem 0.7rem;
  border: 1px solid var(--border);
  text-align: left;
}

th {
  background: var(--surface);
  color: var(--text);
  font-weight: 600;
}

@media (max-width: 640px) {
  body {
    padding: 1rem 0.85rem 2rem;
    font-size: 1rem;
    line-height: 1.6;
  }

  .node-meta {
    font-size: 1em;
    padding: 0.6rem 0.75rem;
  }

  pre {
    font-size: 0.86rem;
    padding: 0.8rem 0.85rem;
  }

  code {
    font-size: 0.88rem;
  }

  th,
  td {
    padding: 0.4rem 0.55rem;
  }
}

</style>
</head>
<body>
<p class="brand">Graphite</p>
<p class="node-meta"><strong>??-0 Service Index</strong> · <a href="../service/index.html">↑ index</a></p>
<h2>??-0 Service Index</h2>



</body>
</html>
